<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IssueTracker Lite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div
      class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-100"
    >
      <div class="flex flex-col items-center mb-6">
        <img src="./resources/github-logo.png" class="w-12 h-12 mb-2" alt="" />
        <h1 class="text-xl font-bold text-gray-800">GitHub Issues Tracker</h1>
        <p class="text-sm text-gray-500">Sign in to manage your issues</p>
      </div>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">
            Username
          </label>
          <input
            type="text"
            id="username"
            placeholder="Enter Username"
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            required
          />
          <p class="text-xs text-purple-600 mt-1">Default: admin</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">
            Password
          </label>
          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            required
          />
          <p class="text-xs text-purple-600 mt-1">Default: admin123</p>
        </div>
        <button
          type="submit"
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        >
          Sign In
        </button>
      </form>

      <div class="mt-6 border-t border-gray-200 pt-4">
        <p class="text-center text-xs text-gray-500 mb-2">OR</p>
        <div class="bg-gray-50 p-3 rounded text-sm text-center">
          <p class="text-gray-600">Demo Credentials:</p>
          <p class="font-semibold text-gray-800">Username: admin</p>
          <p class="font-semibold text-gray-800">Password: admin123</p>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
